# Render Blueprint for AgentSystem.
#
# Deploy from the Render dashboard: New -> Blueprint -> connect the
# KD-CHL/agentsystem repo. Render reads this file and provisions the web
# service plus the Postgres database, wiring the connection string in
# automatically. AGENTSYSTEM_BOOTSTRAP_ADMIN_PASSWORD is marked sync:false so
# Render prompts you to set it once (this becomes the admin login password).
#
# If you prefer a managed Postgres elsewhere (e.g. Neon), delete the
# `databases` block and the fromDatabase env var, then set
# AGENTSYSTEM_DATABASE_URL to your provider's connection string instead.
services:
  - type: web
    name: agentsystem-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install .
    # Migrate first (idempotent), then serve. Render injects $PORT.
    startCommand: alembic upgrade head && uvicorn agentsystem.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AGENTSYSTEM_ENV
        value: production
      - key: AGENTSYSTEM_DATABASE_URL
        fromDatabase:
          name: agentsystem-db
          property: connectionString
      # Never use dev auth mode on a public host.
      - key: AGENTSYSTEM_AUTH_MODE
        value: local
      # Cross-origin cookie for the Vercel-hosted frontend (requires Secure).
      - key: AGENTSYSTEM_AUTH_COOKIE_SECURE
        value: "true"
      - key: AGENTSYSTEM_AUTH_COOKIE_SAMESITE
        value: none
      - key: AGENTSYSTEM_CORS_ORIGINS
        value: https://agentsystem-chls-projects-ddde4200.vercel.app
      # Set once on first deploy; this is the bootstrap admin password.
      - key: AGENTSYSTEM_BOOTSTRAP_ADMIN_PASSWORD
        sync: false

databases:
  - name: agentsystem-db
    plan: free
    region: oregon
